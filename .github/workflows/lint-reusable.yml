name: Lint Reusable

on:
  workflow_call:
    inputs:
      go-version:
        required: true
        type: string
      golangci-lint-version:
        required: true
        type: string

jobs:
  golangci-lint:
    name: Lint all Go modules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ inputs.golangci-lint-version }}

      - name: Run golangci-lint for all modules
        run: |
          set -e
          for mod in inventory order payment shared; do
            echo "Linting $mod"
            (cd boilerplates/$mod && golangci-lint run ./... --config=../.golangci.yml)
          done
