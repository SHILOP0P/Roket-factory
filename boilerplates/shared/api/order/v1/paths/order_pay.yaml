parameters:
  - $ref: ../params/order_uuid.yaml

post:
  summary: Pay order
  operationId: PayOrder
  tags:
    - Order
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/pay_order_request.yaml
  responses:
    '200':
      description: Order paid successfully
      content:
        application/json:
          schema:
            $ref: ../components/pay_order_response.yaml
    '404':
      description: Order not found
      content:
        application/json:
          schema:
            $ref: ../components/errors/not_found_error.yaml
    '409':
      description: Order has invalid state for payment
      content:
        application/json:
          schema:
            $ref: ../components/errors/conflict_error.yaml
    '502':
      description: Bad gateway
      content:
        application/json:
          schema:
            $ref: ../components/errors/bad_gateway_error.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../components/errors/internal_server_error.yaml
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: ../components/errors/generic_error.yaml
